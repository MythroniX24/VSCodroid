name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up NDK
        run: |
          sdkmanager "ndk;27.2.12479018" --channel=0
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Cache downloaded tarballs/debs (before extraction) to avoid re-downloading ~200MB
      - name: Cache download intermediates
        uses: actions/cache@v4
        with:
          path: |
            server/*.tar.gz
            toolchains/termux-packages/*.deb
            toolchains/termux-packages/Packages
            toolchains/build/npm/
            toolchains/extensions/
          key: downloads-${{ hashFiles('scripts/download-vscode-server.sh', 'scripts/download-termux-tools.sh', 'scripts/download-npm.sh', 'scripts/download-python.sh', 'scripts/download-extensions.sh') }}
          restore-keys: |
            downloads-

      # Cache the generated assets directory (extracted, patched VS Code server + tools).
      #
      # IMPORTANT: jniLibs/arm64-v8a (libnode.so) is DELIBERATELY NOT included here.
      # It used to be, which meant a 64-byte stub created by an old/buggy run of
      # this workflow could get cached and silently restored FOREVER on every
      # subsequent run — "Fetch libnode.so" would be skipped (cache-hit=true) and
      # the stale stub would persist no matter how many times you re-ran the build,
      # requiring a manual cache-clear in Settings -> Actions -> Caches to escape.
      # libnode.so is now fetched fresh on every run (see "Fetch libnode.so" below,
      # which has no cache-hit guard) — it's a small, fast release-asset download,
      # not an expensive rebuild, so this costs a few seconds, not minutes.
      - name: Cache generated assets
        id: cache-assets
        uses: actions/cache@v4
        with:
          path: |
            android/app/src/main/assets/vscode-reh/
            android/app/src/main/assets/usr/
            android/app/src/main/assets/extensions/
            server/vscode-reh/
          key: assets-${{ hashFiles('scripts/download-vscode-server.sh', 'scripts/download-termux-tools.sh', 'scripts/download-npm.sh', 'scripts/download-python.sh', 'scripts/download-extensions.sh', 'scripts/build-node-pty.sh') }}
          restore-keys: |
            assets-

      - name: Install system dependencies
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: sudo apt-get install -y --no-install-recommends libarchive-tools

      # Download and prepare all assets (only if not cached)
      - name: Download VS Code Server
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash scripts/download-vscode-server.sh

      - name: Copy VS Code Server to assets
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: |
          mkdir -p android/app/src/main/assets/
          rm -rf android/app/src/main/assets/vscode-reh
          cp -r server/vscode-reh android/app/src/main/assets/vscode-reh

      - name: Download Termux tools
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash scripts/download-termux-tools.sh

      - name: Download npm
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash scripts/download-npm.sh

      - name: Download Python
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash scripts/download-python.sh

      - name: Download extensions
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash scripts/download-extensions.sh

      - name: Build node-pty
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash scripts/build-node-pty.sh

      # libnode.so: fetched from a STABLE release tag ("libnode-prebuilt"),
      # published once by the separate "Build libnode.so" workflow
      # (.github/workflows/build-libnode.yml). Looking up a fixed tag — rather
      # than "latest" — means this keeps working even after real app version
      # releases exist (those become "latest" but don't carry libnode.so).
      #
      # Runs on EVERY build (no cache-hit guard, unlike the steps above) — this
      # is a small, fast release-asset download, not an expensive rebuild, so
      # there is no real cost to always re-verifying it fresh. This is what
      # prevents a stale/stub libnode.so from ever being silently reused via cache.
      #
      # If no valid asset can be found anywhere, THE BUILD NOW FAILS HERE.
      # A previous version of this step silently created a 64-byte placeholder
      # file so the build would "succeed" — producing an APK that installs but
      # can never start its server, showing "Failed to start the server" /
      # "Server took too long to start" on every single launch. Never again:
      # see the error message below for the one-time fix.
      - name: Fetch libnode.so
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          LIBNODE="android/app/src/main/jniLibs/arm64-v8a/libnode.so"

          if [ -f "$LIBNODE" ] && [ "$(wc -c < "$LIBNODE")" -gt 1000000 ]; then
            echo "libnode.so already present ($(du -sh "$LIBNODE" | cut -f1))"
            exit 0
          fi

          echo "Trying stable release tag 'libnode-prebuilt'..."
          if gh release download libnode-prebuilt --repo "$REPO" \
               --pattern "libnode.so" \
               --dir android/app/src/main/jniLibs/arm64-v8a/ --clobber 2>/dev/null; then
            SIZE="$(wc -c < "$LIBNODE")"
            if [ "$SIZE" -gt 1000000 ]; then
              echo "Downloaded from libnode-prebuilt ($(du -sh "$LIBNODE" | cut -f1))"
              exit 0
            fi
            echo "Downloaded asset was too small ($SIZE bytes) — ignoring."
          fi

          echo "Trying latest release (legacy fallback)..."
          if gh release download --repo "$REPO" \
               --pattern "libnode.so" \
               --dir android/app/src/main/jniLibs/arm64-v8a/ --clobber 2>/dev/null; then
            SIZE="$(wc -c < "$LIBNODE")"
            if [ "$SIZE" -gt 1000000 ]; then
              echo "Downloaded from latest release ($(du -sh "$LIBNODE" | cut -f1))"
              exit 0
            fi
            echo "Downloaded asset was too small ($SIZE bytes) — ignoring."
          fi

          rm -f "$LIBNODE"
          echo ""
          echo "============================================================"
          echo "ERROR: No usable libnode.so release asset found in this repo."
          echo ""
          echo "This build CANNOT produce a working app without a real"
          echo "Node.js ARM64 binary. One-time fix (~30-90 minutes):"
          echo "  1. Open the Actions tab of this repository"
          echo "  2. Select 'Build libnode.so' in the left sidebar"
          echo "  3. Click 'Run workflow' and wait for it to finish"
          echo "  4. Re-run this 'Build Debug APK' workflow"
          echo "============================================================"
          exit 1

      - name: Verify assets
        run: |
          echo "=== Assets ==="
          ls -la android/app/src/main/assets/ || true
          echo ""
          echo "=== jniLibs ==="
          ls -la android/app/src/main/jniLibs/arm64-v8a/ || true
          echo ""
          LIBNODE="android/app/src/main/jniLibs/arm64-v8a/libnode.so"
          if [ ! -f "$LIBNODE" ]; then
            echo "ERROR: libnode.so missing entirely (final check)."
            exit 1
          fi
          LIBNODE_SIZE="$(wc -c < "$LIBNODE")"
          if [ "$LIBNODE_SIZE" -lt 1000000 ]; then
            echo "ERROR: libnode.so is only $LIBNODE_SIZE bytes (final check)."
            echo "If this came from cache, clear the 'assets-*' cache in"
            echo "Settings -> Actions -> Caches and re-run."
            exit 1
          fi
          echo "libnode.so OK: $LIBNODE_SIZE bytes"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Unit tests only need compiled Kotlin, not the full assets.
      # Create minimal directory structure so Gradle does not fail.
      - name: Create minimal asset stubs
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/assets/vscode-reh/out
          mkdir -p android/app/src/main/assets/usr
          mkdir -p android/app/src/main/assets/extensions
          printf '\x7fELF' > android/app/src/main/jniLibs/arm64-v8a/libnode.so
          dd if=/dev/zero bs=1 count=60 >> android/app/src/main/jniLibs/arm64-v8a/libnode.so 2>/dev/null

      - name: Run unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest
